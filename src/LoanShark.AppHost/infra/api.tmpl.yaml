api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--sqldata
        value: Server=tcp:{{ .Env.SQL_SQLSERVERFQDN }},1433;Encrypt=True;Authentication="Active Directory Default";Database=sqldata
  template:
    containers:
      - image: {{ .Image }}
        name: api
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: SQLDATA_DATABASENAME
            value: sqldata
          - name: SQLDATA_HOST
            value: '{{ .Env.SQL_SQLSERVERFQDN }}'
          - name: SQLDATA_JDBCCONNECTIONSTRING
            value: jdbc:sqlserver://{{ .Env.SQL_SQLSERVERFQDN }}:1433;database=sqldata;encrypt=true;trustServerCertificate=false
          - name: SQLDATA_PORT
            value: "1433"
          - name: SQLDATA_URI
            value: mssql://{{ .Env.SQL_SQLSERVERFQDN }}:1433/sqldata
          - name: ConnectionStrings__sqldata
            secretRef: connectionstrings--sqldata
    scale:
      minReplicas: 1
tags:
  azd-service-name: api
  aspire-resource-name: api
